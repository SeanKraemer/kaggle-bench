<circle cx="249.6" cy="209.3" r="9" fill="#2563eb"/>
<text class="point-label" fill="#2563eb" text-anchor="start" x="263.6" y="201.3">Single LLM ($0.057)</text>
<circle cx="460.7" cy="213.8" r="9" fill="#0f766e"/>
<text class="point-label" fill="#0f766e" text-anchor="end" x="446.7" y="233.8">Generic agent ($0.143)</text>
<circle cx="867.4" cy="217.5" r="9" fill="#7c3aed"/>
