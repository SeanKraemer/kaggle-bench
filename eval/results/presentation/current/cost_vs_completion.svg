<text class="axis" text-anchor="middle" x="232.2" y="544">$0.05</text>
<text class="axis" text-anchor="middle" x="354.4" y="544">$0.10</text>
<text class="axis" text-anchor="middle" x="476.7" y="544">$0.15</text>
<text class="axis" text-anchor="middle" x="598.9" y="544">$0.20</text>
<text class="axis" text-anchor="middle" x="721.1" y="544">$0.25</text>
<text class="axis" text-anchor="middle" x="843.3" y="544">$0.30</text>
<text class="axis" text-anchor="middle" x="965.6" y="544">$0.35</text>
<line x1="110" y1="520" x2="990" y2="520" stroke="#111827"/>
<line x1="110" y1="120" x2="110" y2="520" stroke="#111827"/>
<text class="axis-title" text-anchor="middle" x="550.0" y="572">Mean estimated cost per run (USD)</text>
<text class="axis-title" text-anchor="middle" transform="rotate(-90 30 320.0)" x="30" y="320.0">Mean task-completion score</text>
<line x1="110" y1="165.6" x2="990" y2="165.6" stroke="#111827" stroke-width="2" stroke-dasharray="7 6"/>
<text class="ref-label" x="986" y="157.6" text-anchor="end">Human reference (0.89)</text>
<circle cx="110.0" cy="348.8" r="9" fill="#8f99a8"/>
