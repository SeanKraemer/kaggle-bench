<text class="axis" text-anchor="end" x="100" y="284.0">0.6</text>
<line x1="110" y1="200.0" x2="990" y2="200.0" stroke="#e5e7eb"/>
<text class="axis" text-anchor="end" x="100" y="204.0">0.8</text>
<line x1="110" y1="120.0" x2="990" y2="120.0" stroke="#e5e7eb"/>
<text class="axis" text-anchor="end" x="100" y="124.0">1.0</text>
