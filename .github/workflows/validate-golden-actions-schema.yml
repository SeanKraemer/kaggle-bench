name: Validate Golden Actions Schema

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-golden-actions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --dev

      - name: Validate all golden_actions.json files
        run: uv run python data/collector/scripts/validate_golden_actions_schema.py
