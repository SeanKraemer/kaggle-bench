name: PR Basic Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run basic checks
        run: uv run pre-commit run --all-files --show-diff-on-failure
