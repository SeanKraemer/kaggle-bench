name: Agent Unit Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  agent-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run agent unit tests
        run: uv run python -m unittest discover -s agent/tests -p 'test_*.py'
