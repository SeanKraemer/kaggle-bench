name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pre-commit hygiene hooks
        run: SKIP=agent-unit-tests,eval-unit-tests,validate-golden-actions-schema uv run pre-commit run --all-files --show-diff-on-failure

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Pyright
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Agent unit tests
        run: uv run python -m unittest discover -s agent/tests -p 'test_*.py'
      - name: Evaluator unit tests
        run: uv run python -m unittest discover -s eval/tests -p 'test_*.py'
